<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f4f8ff;
margin:0;
}
.container{
max-width:400px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
h2{
text-align:center;
color:#0047a1;
}
input,select{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:12px;
background:#0047a1;
color:white;
border:none;
font-size:18px;
border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Student Registration</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="tel" placeholder="Mobile Number">

<select>
<option>Select Exam</option>
<option>NEET</option>
<option>JEE</option>
<option>MHT-CET</option>
<option>SSC</option>
<option>Banking</option>
<option>Railway</option>
</select>

<input type="password" placeholder="Create Password">

<button>Register</button>

</div>

</body>
</html>
